# Diagnostician Agent - Read-only access to Kubernetes resources
# Used for: LogTool, EventTool, ListTool, KubeTool, RequestTool, TavilyTool
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeagent-diagnostician
  namespace: kubeagent-system
  labels:
    app: kubeagent
    component: diagnostician
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeagent-diagnostician
  namespace: kubeagent-system
  labels:
    app: kubeagent
    component: diagnostician
rules:
  # Read pods and logs
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch"]
  # Read events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Read core resources
  - apiGroups: [""]
    resources: ["services", "configmaps", "namespaces", "endpoints", 
                "persistentvolumeclaims", "replicationcontrollers", "secrets"]
    verbs: ["get", "list", "watch"]
  # Read workload resources
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Read batch resources
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # Read networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  # Read nodes and PVs
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Read metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Read pod metrics (custom.metrics.k8s.io)
  - apiGroups: ["custom.metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeagent-diagnostician
  namespace: kubeagent-system
  labels:
    app: kubeagent
    component: diagnostician
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeagent-diagnostician
subjects:
  - kind: ServiceAccount
    name: kubeagent-diagnostician
    namespace: kubeagent-system
