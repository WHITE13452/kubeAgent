# Kustomization for RBAC configuration
# Apply with: kubectl apply -k deploy/rbac/
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubeagent-system

resources:
  - coordinator.yaml
  - diagnostician.yaml
  - remediator.yaml
  - security.yaml

commonLabels:
  app: kubeagent
