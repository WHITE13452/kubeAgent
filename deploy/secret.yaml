apiVersion: v1
kind: Secret
metadata:
  name: kubeagent-secrets
  namespace: kubeagent
  labels:
    app: kubeagent
type: Opaque
stringData:
  # Replace with your actual API key
  dashscope-api-key: "YOUR_DASHSCOPE_API_KEY_HERE"
  # Optional: Tavily API key for web search
  # tavily-api-key: "YOUR_TAVILY_API_KEY_HERE"
