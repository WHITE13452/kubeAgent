apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeagent
  namespace: kubeagent
  labels:
    app: kubeagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeagent
  labels:
    app: kubeagent
rules:
  # Core resources - read
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "namespaces", "events",
                "persistentvolumeclaims", "endpoints", "replicationcontrollers"]
    verbs: ["get", "list", "watch"]
  # Core resources - write (for remediation)
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["create", "delete", "patch"]
  # Apps resources
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Batch resources
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  # Nodes (read-only)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Metrics (for kubectl top)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeagent
  labels:
    app: kubeagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeagent
subjects:
  - kind: ServiceAccount
    name: kubeagent
    namespace: kubeagent
